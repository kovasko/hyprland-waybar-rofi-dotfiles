general {
  gaps_in = 5
  gaps_out = 20
  border_size = 2
  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(595959aa)
  resize_on_border = false
  allow_tearing = false
  layout = dwindle 
}

decoration {
  rounding = 12
  active_opacity = 0.95
  inactive_opacity = 0.92

  shadow {
    enabled = true
    range = 12
    render_power = 3
    color = rgba(00000055)   
  }

  blur {
    enabled = yes

    size = 12          
    passes = 2         
    ignore_opacity = true
    new_optimizations = true
    xray = true       

    noise = 0.00 
    contrast = 1.00 
  }
}


animations {
    enabled = yes

    # Courbes d’animation (style Apple : rapide au début, douce à la fin)
    bezier = macEase,0.25,0.1,0.25,1
    bezier = macEaseOut,0.23,1,0.32,1
    bezier = macEaseInOut,0.42,0,0.58,1
    bezier = linear,0,0,1,1

    # Animation globale
    animation = global, 1, 7, macEase

    # Fenêtres (ouvertures/fermetures)
    animation = windows, 1, 4, macEaseOut
    animation = windowsIn, 1, 4, macEaseOut, popin 85%
    animation = windowsOut, 1, 2, linear, popin 85%

    # Opacité (fade)
    animation = fadeIn, 1, 2.3, macEaseInOut
    animation = fadeOut, 1, 2.0, macEaseInOut
    animation = fade, 1, 3, macEase

    # Layers (barres, menus, notifications)
    animation = layers, 1, 3.5, macEaseOut
    animation = layersIn, 1, 3.5, macEaseOut, fade
    animation = layersOut, 1, 2, linear, fade

    # Workspaces — SLIDE horizontal façon macOS Mission Control
    animation = workspaces, 1, 2.1, macEaseOut, slide
    animation = workspacesIn, 1, 2.1, macEaseOut, slide
    animation = workspacesOut, 1, 2.1, macEaseOut, slide
}


dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = -1
  disable_hyprland_logo = true
}

