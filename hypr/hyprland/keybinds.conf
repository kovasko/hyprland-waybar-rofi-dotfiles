# Modifiers
$mainMod = SUPER
$mod = $mainMod
$shiftMod = SHIFT

# Apps
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$browser = firefox

# Base 
bind = $mod, T, exec, $terminal
bind = $mod, Q, killactive,
bind = $mod, M, exit,
bind = $mod, V, exec, ~/.config/hypr/scripts/float-center.sh 
bind = $mod, C, exec, ~/.config/rofi/scripts/cliphist-rofi-img.sh | rofi -dmenu -display-columns 2 | wl-copy 
#bind = $mod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod, F, fullscreen 
bind = $mod, E, exec, $fileManager
bind = $mod, W, exec, $browser
bind = $mod, D, exec, $menu
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,

# Focus (flèches)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces (AZERTY)
bind = $mod, ampersand, workspace, 1
bind = $mod, eacute,    workspace, 2
bind = $mod, quotedbl,  workspace, 3
bind = $mod, apostrophe,workspace, 4
bind = $mod, parenleft, workspace, 5
bind = $mod, minus,     workspace, 6
bind = $mod, egrave,    workspace, 7
bind = $mod, underscore,workspace, 8
bind = $mod, ccedilla,  workspace, 9
bind = $mod, agrave,    workspace, 10

bind = $mod $shiftMod, ampersand, movetoworkspace, 1
bind = $mod $shiftMod, eacute,    movetoworkspace, 2
bind = $mod $shiftMod, quotedbl,  movetoworkspace, 3
bind = $mod $shiftMod, apostrophe,movetoworkspace, 4
bind = $mod $shiftMod, parenleft, movetoworkspace, 5

# Media 
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Luminosité
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# Screenshots (hyprshot)
bind = $mod, PRINT, exec, hyprshot -m window
bind = ,     PRINT, exec, hyprshot -m output
bind = $shiftMod, PRINT, exec, hyprshot -m region

# Déplacer ou changer la taille des fenêtres
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

